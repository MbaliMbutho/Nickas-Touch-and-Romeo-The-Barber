<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Responsive Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Contact Page Stylesheet -->
    <link rel="stylesheet" href="./css/contact.css">

    <!-- Page Title -->
    <title>Contact | Signature Cuts & Beauty</title>

</head>

<body>

    <!-- ================= LIVE VIDEO BACKGROUND ================= -->

    <!-- Background Video -->
    <video autoplay muted loop playsinline class="page-video">
        <source src="./live background/wallpaper.mp4" type="video/mp4">
    </video>

    <!-- Dark Overlay for Better Readability -->
    <div class="page-overlay"></div>

    <!-- ================= HEADER / NAVIGATION ================= -->

    <header>

        <div class="container navbar">

            <!-- Logo and Business Name -->
            <a href="home.html" class="logo">
                <img src="./images/comb.jpg" alt="Salon Logo">
                Signature Cuts & Beauty
            </a>

            <!-- Navigation Menu -->
            <nav>
                <ul>
                    <li><a href="home.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="reviews.html">Reviews</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>

        </div>

    </header>

    <!-- ================= PAGE TITLE SECTION ================= -->

    <section class="sectionFirst">

        <div class="container">

            <!-- Main Contact Page Heading -->
            <h1>Contact Us</h1>

        </div>

    </section>

    <!-- ================= CONTACT FORM SECTION ================= -->

    <section class="FormMap">

        <!-- Contact Form Container -->
        <div class="form">

            <!-- Form Heading -->
            <div class="f-head">
                Get In Touch
            </div>

            <!-- Form Subheading -->
            <div class="f-para">
                Contact us for more information
            </div>

            <!-- Contact Form -->
            <!-- Note: Form is currently frontend only and not connected to a database or email service -->
            <form>

                <!-- Customer Name Input -->
                <label>Name</label>
                <input type="text" placeholder="Your name" required>

                <!-- Customer Phone Number Input -->
                <label>Phone</label>
                <input type="tel" placeholder="e.g. 071 234 5678" required>

                <!-- Customer Email Input -->
                <label>Email</label>
                <input type="email" placeholder="your@email.com" required>

                <!-- Customer Message Input -->
                <label>Message</label>
                <textarea rows="5" placeholder="Type your message here..."></textarea>

                <!-- Submit Button -->
                <button type="submit">
                    Send Message
                </button>

            </form>

        </div>

    </section>

    <!-- ================= FOOTER SECTION ================= -->

    <footer>

        <div class="container">

            <!-- Copyright Information -->
            <div>
                © 2026 Nicka's Touch Salon and Romeo The Barber
            </div>

            <!-- Business Slogan -->
            <div>
                Your Style, Our Passion
            </div>

        </div>

    </footer>

</body>

</html>
