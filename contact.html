<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | Signature Cuts & Beauty</title>

<style>

/* ===== GLOBAL RESET ===== */
/* Removes default spacing and ensures consistent box sizing */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

/* Base page styling */
body{
    background:#F9F6F1;
    color:#222;
}

/* Main content wrapper (centers content and limits width) */
.container{
    width:90%;
    max-width:1100px;
    margin:auto;
}

/* ===== HEADER / NAVBAR ===== */
header{
    background:#00012A;
}

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 0;
}

/* Logo styling (image + text) */
.logo{
    display:flex;
    align-items:center;
    gap:10px;
    color:#fff;
    text-decoration:none;
    font-size:21px;
    font-weight:bold;
}

.logo img{
    width:45px;
    height:45px;
    border-radius:50%;
}

/* Navigation menu */
nav ul{
    display:flex;
    list-style:none;
}

nav ul li{
    margin-left:22px;
}

nav ul li a{
    color:#fff;
    text-decoration:none;
}

/* Hover effect for nav links */
nav ul li a:hover{
    color:#6BD425;
}

/* ===== PAGE TITLE ===== */
.sectionFirst{
    padding:55px 0 15px;
}

.sectionFirst h1{
    font-size:34px;
}

/* ===== CONTACT FORM SECTION ===== */
.FormMap{
    padding:50px 0;
    display:flex;
    justify-content:center;
}

/* Form card container */
.form{
    background:#fff;
    padding:28px;
    width:100%;
    max-width:500px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* Form heading */
.f-head{
    font-size:24px;
    font-weight:bold;
    margin-bottom:5px;
}

/* Subheading text */
.f-para{
    color:#6BD425;
    margin-bottom:20px;
}

/* Form layout */
form{
    display:flex;
    flex-direction:column;
    gap:14px;
}

/* Input fields and textarea */
input, textarea{
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    outline:none;
    font-size:14px;
}

/* Focus state for better UX */
input:focus, textarea:focus{
    border-color:#6BD425;
}

/* Prevent textarea resizing */
textarea{
    resize:none;
}

/* Submit button */
button{
    padding:12px;
    border:none;
    background:#00012A;
    color:#fff;
    font-size:15px;
    border-radius:6px;
    cursor:pointer;
    transition:0.25s;
}

/* Button hover effect */
button:hover{
    background:#6BD425;
}

/* ===== FOOTER ===== */
footer{
    background:#fff;
    padding:20px 0;
    margin-top:40px;
}

/* Footer layout */
footer .container{
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    font-size:14px;
}

/* ===== RESPONSIVE DESIGN ===== */
@media(max-width:600px){
    .navbar{
        flex-direction:column;
        gap:10px;
    }
}

</style>

</head>

<body>

<!-- ===== HEADER ===== -->
<header>
    <div class="container navbar">

        <!-- Logo / Brand -->
        <a href="#" class="logo">
            <img src="./images/comb.jpg" alt="Salon logo">
            Signature Cuts & Beauty
        </a>

        <!-- Navigation Links -->
        <nav>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="reviews.html">Reviews</a></li>				
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>

    </div>
</header>

<!-- ===== PAGE TITLE ===== -->
<section class="sectionFirst">
    <div class="container">
        <h1>Contact Us</h1>
    </div>
</section>

<!-- ===== CONTACT FORM ===== -->
<section class="FormMap">
    <div class="form">

        <!-- Form Header -->
        <div class="f-head">Get In Touch</div>
        <div class="f-para">Contact us for more information</div>

        <!-- NOTE: No backend connected yet -->
        <form>

            <!-- Name Field -->
            <label>Name</label>
            <input type="text" placeholder="Your name" required>

            <!-- Phone Field -->
            <label>Phone</label>
            <input type="tel" placeholder="e.g. 071 234 5678" required>

            <!-- Email Field -->
            <label>Email</label>
            <input type="email" placeholder="your@email.com" required>

            <!-- Message Field -->
            <label>Message</label>
            <textarea rows="5" placeholder="Type your message here..."></textarea>

            <!-- Submit Button -->
            <button type="submit">Send Message</button>

        </form>

    </div>
</section>

<!-- ===== FOOTER ===== -->
<footer>
    <div class="container">
        <div>© 2026 Nicka's Touch Salon and Romeo The Barber</div>
        <div>Your Style, Our Passion</div>
    </div>
</footer>

</body>
</html>
