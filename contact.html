<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Contact Signature Cuts & Beauty for appointments, enquiries, grooming, braiding and barber services.">
    <meta name="keywords" content="contact salon, barber booking, braids appointment, Signature Cuts and Beauty">
    <meta name="author" content="Signature Cuts & Beauty">

    <link rel="stylesheet" href="./css/contact.css">

    <title>Contact | Signature Cuts & Beauty</title>
</head>

<body>

    <video autoplay muted loop playsinline class="page-video">
        <source src="./live background/wallpaper.mp4" type="video/mp4">
    </video>

    <div class="page-overlay"></div>

    <header>
        <div class="container navbar">

            <a href="home.html" class="logo">
                <img src="./images/comb.jpg" alt="Signature Cuts and Beauty salon logo" loading="lazy">
                Signature Cuts & Beauty
            </a>

            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="reviews.html">Reviews</a></li>
                    <li><a href="enquiry.html">Enquiry</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>

        </div>
    </header>

    <section class="sectionFirst">
        <div class="container">
            <h1>Contact Us</h1>
        </div>
    </section>

    <section class="FormMap">

        <div class="form">

            <div class="f-head">
                Get In Touch
            </div>

            <div class="f-para">
                Contact us for more information
            </div>

            <form id="contactForm">

                <label>Name</label>
                <input type="text" id="contactName" placeholder="Your name" required>

                <label>Phone</label>
                <input type="tel" id="contactPhone" placeholder="e.g. 071 234 5678" required>

                <label>Email</label>
                <input type="email" id="contactEmail" placeholder="your@email.com" required>

                <label>Message Type</label>
                <select id="messageType" required>
                    <option value="">Select message type</option>
                    <option value="General Enquiry">General Enquiry</option>
                    <option value="Booking">Booking</option>
                    <option value="Complaint">Complaint</option>
                    <option value="Feedback">Feedback</option>
                </select>

                <label>Message</label>
                <textarea id="contactMessage" rows="5" placeholder="Type your message here..." required></textarea>

                <button type="submit">
                    Send Message
                </button>

                <p id="formMessage"></p>

            </form>

        </div>

    </section>

    <footer>
        <div class="container">
            <div>
                © 2026 Nicka's Touch Salon and Romeo The Barber
            </div>

            <div>
                Your Style, Our Passion
            </div>
        </div>
    </footer>

    <script src="./js/script.js"></script>

</body>
</html>
